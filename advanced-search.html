<script type="text/javascript">
(function() {
    "use strict";

    const pluginId = "advanced-search";
    const tabId = "advanced-search";
    const actionName = "advanced-search:show";
    const maxNodeResults = 500;
    const maxMatchesPerNode = 8;
    const maxMatchesPerProperty = 4;
    const blockCoreSearchHoverStorageKey = "node-red-advanced-search.block-core-search-hover";

    let ui = null;
    let blockCoreSearchHover = true;

    function escapeRegExp(value) {
        return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function loadBlockCoreSearchHover() {
        try {
            const saved = window.localStorage.getItem(blockCoreSearchHoverStorageKey);
            return saved === null ? true : saved == "true";
        } catch (error) {
            return true;
        }
    }

    function saveBlockCoreSearchHover() {
        try {
            window.localStorage.setItem(blockCoreSearchHoverStorageKey, String(blockCoreSearchHover));
        } catch (error) {
            console.warn("[Advanced Search] Unable to save the core search hover preference", error);
        }
    }

    function stopCoreSearchAutoReveal(event) {
        if (!blockCoreSearchHover) {
            return;
        }

        let target = event.target;
        if (target && target.nodeType != 1) {
            target = target.parentElement;
        }
        if (!target || typeof target.closest != "function") {
            return;
        }

        const result = target.closest("#red-ui-search .red-ui-search-result");
        if (!result) {
            return;
        }

        // Only intercept actual node results. History, “more results” entries,
        // and empty-state messages keep their normal behaviour.
        if (!result.querySelector(".red-ui-search-result-node-description")) {
            return;
        }

        // Node-RED 5 already removed hover reveal and adds a result tools container.
        // In that case the plug-in does not interfere.
        if (result.querySelector(".red-ui-search-result-tools")) {
            return;
        }

        event.stopImmediatePropagation();
        event.stopPropagation();
    }

    function installCoreSearchHoverGuard() {
        document.removeEventListener("mouseover", stopCoreSearchAutoReveal, true);
        document.addEventListener("mouseover", stopCoreSearchAutoReveal, true);
    }

    function removeCoreSearchHoverGuard() {
        document.removeEventListener("mouseover", stopCoreSearchAutoReveal, true);
    }

    function unquote(value) {
        if (value.length >= 2 && value[0] == '"' && value[value.length - 1] == '"') {
            return value.slice(1, -1).replace(/\\"/g, '"').replace(/\\\\/g, "\\");
        }
        return value;
    }

    function tokenize(value) {
        return value.match(/(?:[^\s"]+:"(?:\\.|[^"])*"|"(?:\\.|[^"])*"|\S+)/g) || [];
    }

    function parseQuery(rawQuery) {
        const options = {
            query: "",
            caseSensitive: ui.caseSensitive.prop("checked"),
            wholeWord: ui.wholeWord.prop("checked"),
            regex: ui.regex.prop("checked"),
            numeric: ui.numeric.prop("checked"),
            currentFlow: ui.currentFlow.prop("checked"),
            includeConfig: ui.includeConfig.prop("checked"),
            nodeType: ui.nodeType.val() || ""
        };

        const terms = [];
        const tokens = tokenize(rawQuery.trim());

        tokens.forEach(function(token) {
            const separator = token.indexOf(":");
            const prefix = separator > -1 ? token.slice(0, separator).toLowerCase() : "";
            const suffix = separator > -1 ? unquote(token.slice(separator + 1)) : "";

            switch (prefix) {
                case "case":
                    options.caseSensitive = true;
                    if (suffix) {
                        terms.push(suffix);
                    }
                    break;

                case "word":
                    options.wholeWord = true;
                    if (suffix) {
                        terms.push(suffix);
                    }
                    break;

                case "re":
                    options.regex = true;
                    options.numeric = false;
                    if (suffix) {
                        terms.push(suffix);
                    }
                    break;

                case "num":
                    options.numeric = true;
                    options.regex = false;
                    if (suffix) {
                        terms.push(suffix);
                    }
                    break;

                case "type":
                    options.nodeType = suffix;
                    break;

                case "flow":
                    if (suffix.toLowerCase() == "current") {
                        options.currentFlow = true;
                    }
                    break;

                case "config":
                    if (suffix.toLowerCase() == "yes" || suffix.toLowerCase() == "true") {
                        options.includeConfig = true;
                    }
                    break;

                default:
                    terms.push(unquote(token));
                    break;
            }
        });

        options.query = terms.join(" ").trim();
        return options;
    }

    function createMatcher(options) {
        if (!options.query) {
            throw new Error("Enter something to search for.");
        }

        let source;

        if (options.regex) {
            source = options.query;
        } else if (options.numeric) {
            const numericValue = Number(options.query);
            if (!Number.isFinite(numericValue)) {
                throw new Error("Exact-number search requires a valid number.");
            }
            source = "(?<![0-9A-Za-z_$])" + escapeRegExp(options.query) + "(?![0-9A-Za-z_$])";
        } else {
            source = escapeRegExp(options.query);
            if (options.wholeWord) {
                source = "(?<![0-9A-Za-z_$])" + source + "(?![0-9A-Za-z_$])";
            }
        }

        let regex;
        try {
            regex = new RegExp(source, options.caseSensitive ? "g" : "gi");
        } catch (error) {
            throw new Error("Invalid regular expression: " + error.message);
        }

        return {
            numericValue: options.numeric ? Number(options.query) : null,
            regex: regex,
            numeric: options.numeric
        };
    }

    function getLineData(text, index) {
        const lineStart = text.lastIndexOf("\n", index - 1) + 1;
        let lineEnd = text.indexOf("\n", index);
        if (lineEnd == -1) {
            lineEnd = text.length;
        }

        const line = text.slice(0, index).split("\n").length;
        let snippet = text.slice(lineStart, lineEnd).trim();
        if (snippet.length > 180) {
            const offset = Math.max(0, index - lineStart - 65);
            snippet = (offset > 0 ? "…" : "") + snippet.slice(offset, offset + 140) + (snippet.length > offset + 140 ? "…" : "");
        }

        return { line: line, snippet: snippet };
    }

    function findMatches(value, path, matcher) {
        if (matcher.numeric && typeof value == "number") {
            if (value === matcher.numericValue) {
                return [{ path: path, line: null, snippet: String(value) }];
            }
            return [];
        }

        if (typeof value != "string" && typeof value != "number" && typeof value != "boolean") {
            return [];
        }

        const text = String(value);
        const matches = [];
        matcher.regex.lastIndex = 0;

        let match;
        while ((match = matcher.regex.exec(text)) !== null) {
            const lineData = getLineData(text, match.index);
            matches.push({
                path: path,
                line: text.includes("\n") ? lineData.line : null,
                snippet: lineData.snippet || text
            });

            if (matches.length >= maxMatchesPerProperty) {
                break;
            }

            if (match[0] === "") {
                matcher.regex.lastIndex++;
            }
        }

        return matches;
    }

    function searchValue(value, path, matcher, matches) {
        if (matches.length >= maxMatchesPerNode || value === null || value === undefined) {
            return;
        }

        if (Array.isArray(value)) {
            value.forEach(function(item, index) {
                searchValue(item, path + "[" + index + "]", matcher, matches);
            });
            return;
        }

        if (typeof value == "object") {
            Object.keys(value).forEach(function(key) {
                if (matches.length >= maxMatchesPerNode) {
                    return;
                }
                searchValue(value[key], path ? path + "." + key : key, matcher, matches);
            });
            return;
        }

        matches.push.apply(matches, findMatches(value, path, matcher));
    }

    function getSearchData(node) {
        const data = {
            id: node.id,
            type: node.type
        };

        if (node._def && node._def.defaults) {
            Object.keys(node._def.defaults).forEach(function(property) {
                if (property != "credentials") {
                    data[property] = node[property];
                }
            });
        } else if (node._orig) {
            Object.keys(node._orig).forEach(function(property) {
                if (property != "credentials" && property[0] != "_") {
                    data[property] = node._orig[property];
                }
            });
        }

        ["name", "info", "inputLabels", "outputLabels"].forEach(function(property) {
            if (node[property] !== undefined && data[property] === undefined) {
                data[property] = node[property];
            }
        });

        return data;
    }

    function getNodeLabel(node) {
        try {
            return RED.utils.getNodeLabel(node, node.type) || node.name || node.type;
        } catch (error) {
            return node.name || node.type;
        }
    }

    function getFlowLabel(node) {
        if (!node.z) {
            return "Configuration nodes";
        }

        const flow = RED.nodes.workspace(node.z) || RED.nodes.subflow(node.z);
        if (!flow) {
            return node.z;
        }
        return flow.label || flow.name || flow.id;
    }

    function collectNodes(includeConfig) {
        const nodes = [];
        RED.nodes.eachNode(function(node) {
            nodes.push(node);
        });

        if (includeConfig && typeof RED.nodes.eachConfig == "function") {
            RED.nodes.eachConfig(function(node) {
                nodes.push(node);
            });
        }

        return nodes;
    }

    function refreshNodeTypes(includeConfig) {
        const selected = ui.nodeType.val() || "";
        const types = new Set();

        collectNodes(includeConfig).forEach(function(node) {
            types.add(node.type);
        });

        ui.nodeType.empty().append($("<option>", { value: "", text: "All node types" }));
        Array.from(types).sort(function(a, b) {
            return a.localeCompare(b);
        }).forEach(function(type) {
            ui.nodeType.append($("<option>", { value: type, text: type }));
        });

        if (types.has(selected)) {
            ui.nodeType.val(selected);
        }
    }

    function performSearch() {
        const started = performance.now();
        ui.error.empty().hide();
        ui.results.empty();

        let options;
        let matcher;
        try {
            options = parseQuery(ui.query.val());
            matcher = createMatcher(options);
        } catch (error) {
            ui.summary.text("No results");
            ui.error.text(error.message).show();
            return;
        }

        refreshNodeTypes(options.includeConfig);

        const activeFlow = typeof RED.workspaces.active == "function" ? RED.workspaces.active() : null;
        const results = [];
        let totalMatches = 0;
        let truncated = false;

        const nodes = collectNodes(options.includeConfig);
        for (let index = 0; index < nodes.length; index++) {
            const node = nodes[index];

            if (options.currentFlow && node.z != activeFlow) {
                continue;
            }
            if (options.nodeType && node.type != options.nodeType) {
                continue;
            }

            const matches = [];
            searchValue(getSearchData(node), "", matcher, matches);

            if (matches.length) {
                results.push({ node: node, matches: matches });
                totalMatches += matches.length;
            }

            if (results.length >= maxNodeResults) {
                truncated = true;
                break;
            }
        }

        renderResults(results);

        const elapsed = Math.round(performance.now() - started);
        let summary = results.length + (results.length == 1 ? " node" : " nodes") + ", " + totalMatches + (totalMatches == 1 ? " match" : " matches") + " · " + elapsed + " ms";
        if (truncated) {
            summary += " · limit of " + maxNodeResults + " nodes reached";
        }
        ui.summary.text(summary);
    }

    function renderResults(results) {
        if (!results.length) {
            const empty = $("<div>", { class: "nr-advanced-search-empty" }).appendTo(ui.results);
            $("<i>", { class: "fa fa-search nr-advanced-search-empty-icon" }).appendTo(empty);
            $("<div>", { class: "nr-advanced-search-empty-title", text: "No nodes found" }).appendTo(empty);
            $("<div>", {
                class: "nr-advanced-search-empty-text",
                text: "Try changing the query or disabling one of the filters."
            }).appendTo(empty);
            return;
        }

        results.forEach(function(result) {
            const node = result.node;
            const card = $("<div>", { class: "nr-advanced-search-result" }).appendTo(ui.results);
            const header = $("<div>", { class: "nr-advanced-search-result-header" }).appendTo(card);
            const titleArea = $("<div>", { class: "nr-advanced-search-result-title-area" }).appendTo(header);
            const titleRow = $("<div>", { class: "nr-advanced-search-result-title-row" }).appendTo(titleArea);

            $("<div>", { class: "nr-advanced-search-result-title", text: getNodeLabel(node) }).appendTo(titleRow);
            $("<span>", { class: "nr-advanced-search-node-type", text: node.type }).appendTo(titleRow);
            $("<span>", {
                class: "nr-advanced-search-match-count",
                text: result.matches.length
            }).attr("title", result.matches.length == 1 ? "1 match" : result.matches.length + " matches").appendTo(titleRow);

            const meta = $("<div>", { class: "nr-advanced-search-result-meta" }).appendTo(titleArea);
            $("<span>", { class: "nr-advanced-search-flow", text: getFlowLabel(node) }).appendTo(meta);
            $("<span>", { class: "nr-advanced-search-id", text: node.id }).appendTo(meta);

            const revealButton = $("<button>", {
                class: "red-ui-button red-ui-button-small nr-advanced-search-reveal",
                type: "button",
                title: "Reveal il node nel workspace"
            }).appendTo(header).on("click", function(event) {
                event.preventDefault();
                event.stopPropagation();
                RED.view.reveal(node.id);
            });
            $("<i>", { class: "fa fa-crosshairs" }).appendTo(revealButton);
            $("<span>", { text: "Reveal" }).appendTo(revealButton);

            const matchList = $("<div>", { class: "nr-advanced-search-match-list" }).appendTo(card);
            result.matches.forEach(function(match) {
                const row = $("<div>", { class: "nr-advanced-search-match" }).appendTo(matchList);
                const location = match.path + (match.line ? " · line " + match.line : "");
                const path = $("<div>", { class: "nr-advanced-search-match-path" }).appendTo(row);
                $("<i>", { class: "fa fa-code" }).appendTo(path);
                $("<span>", { text: location }).appendTo(path);
                $("<pre>", { class: "nr-advanced-search-match-snippet", text: match.snippet }).appendTo(row);
            });

            card.on("dblclick", function() {
                RED.view.reveal(node.id);
            });
        });
    }

    function createCheckbox(label, checked, title) {
        const wrapper = $("<label>", {
            class: "nr-advanced-search-option",
            title: title || ""
        });
        const input = $("<input>", { type: "checkbox" }).prop("checked", checked).appendTo(wrapper);
        const text = $("<span>", { class: "nr-advanced-search-option-label" }).appendTo(wrapper);
        $("<i>", { class: "fa fa-check" }).appendTo(text);
        $("<span>", { text: label }).appendTo(text);
        return { wrapper: wrapper, input: input };
    }

    function createSidebar() {
        const content = $("<div>", { class: "nr-advanced-search" });
        const controls = $("<div>", { class: "nr-advanced-search-controls" }).appendTo(content);

        const heading = $("<div>", { class: "nr-advanced-search-heading" }).appendTo(controls);
        $("<div>", { class: "nr-advanced-search-heading-title", text: "Advanced Search" }).appendTo(heading);
        $("<div>", {
            class: "nr-advanced-search-heading-text",
            text: "Search node properties and Function code"
        }).appendTo(heading);

        const searchBlock = $("<div>", { class: "nr-advanced-search-search-block" }).appendTo(controls);
        const query = $("<input>", {
            class: "nr-advanced-search-query",
            type: "text",
            placeholder: "Testo, num:810, case:Echo, re:..."
        })
            .attr("autocomplete", "off")
            .attr("spellcheck", "false")
            .appendTo(searchBlock);

        const searchActions = $("<div>", { class: "nr-advanced-search-search-actions" }).appendTo(searchBlock);
        const searchButton = $("<button>", {
            class: "nr-advanced-search-search-button",
            type: "button",
            title: "Search",
            "aria-label": "Search"
        }).appendTo(searchActions);
        searchButton.html(
            '<svg viewBox="0 0 20 20" aria-hidden="true" focusable="false">' +
                '<circle cx="8.2" cy="8.2" r="5.2" />' +
                '<path d="M12.1 12.1l4.4 4.4" />' +
            '</svg>'
        );

        const clearQueryButton = $("<button>", {
            class: "nr-advanced-search-clear-query",
            type: "button",
            title: "Clear query",
            "aria-label": "Clear query"
        }).appendTo(searchActions);
        clearQueryButton.html(
            '<svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">' +
                '<path d="M3.5 3.5l9 9M12.5 3.5l-9 9" />' +
            '</svg>'
        );

        const sectionHeader = $("<div>", { class: "nr-advanced-search-section-header" }).appendTo(controls);
        $("<span>", { text: "Filters" }).appendTo(sectionHeader);
        const clearButton = $("<button>", {
            class: "nr-advanced-search-reset",
            type: "button",
            text: "Reset"
        }).appendTo(sectionHeader);

        const filters = $("<div>", { class: "nr-advanced-search-filters" }).appendTo(controls);
        const caseSensitive = createCheckbox("Case sensitive", false, "Match letter case");
        const wholeWord = createCheckbox("Whole word", false, "Match complete words only");
        const regex = createCheckbox("Regex", false, "Interpret the query as a regular expression");
        const numeric = createCheckbox("Exact number", false, "Distinguish 810 from 1810 and 8100");
        const currentFlow = createCheckbox("Current flow", false, "Search soltanto nel flow aperto");
        const includeConfig = createCheckbox("Config nodes", false, "Include anche i nodes di configurazione");

        [caseSensitive, wholeWord, regex, numeric, currentFlow, includeConfig].forEach(function(option) {
            option.wrapper.appendTo(filters);
        });

        // Node-type filtering remains available through type:function,
        // while the dropdown stays hidden from the interface.
        const nodeType = $("<select>", {
            class: "nr-advanced-search-node-type-filter",
            "aria-hidden": "true",
            tabindex: "-1"
        });

        const behaviorHeader = $("<div>", { class: "nr-advanced-search-section-header nr-advanced-search-behavior-header" }).appendTo(controls);
        $("<span>", { text: "Editor behaviour" }).appendTo(behaviorHeader);
        const behavior = $("<div>", { class: "nr-advanced-search-behavior" }).appendTo(controls);
        const blockCoreSearch = createCheckbox(
            "Block Node-RED 4 search hover reveal",
            blockCoreSearchHover,
            "Prevent Node-RED 4 core search from revealing nodes on mouse hover"
        );
        blockCoreSearch.wrapper.appendTo(behavior);
        $("<div>", {
            class: "nr-advanced-search-behavior-text",
            text: "Clicking a result continues to work normally."
        }).appendTo(behavior);

        const help = $("<details>", { class: "nr-advanced-search-help" }).appendTo(controls);
        const helpSummary = $("<summary>").appendTo(help);
        $("<i>", { class: "fa fa-lightbulb-o" }).appendTo(helpSummary);
        $("<span>", { text: "Quick syntax" }).appendTo(helpSummary);
        const helpText = $("<div>", { class: "nr-advanced-search-help-text" }).appendTo(help);
        [
            ["case:Echo", "case sensitive"],
            ["word:pippo", "whole word"],
            ["num:810", "exact number"],
            ["type:function pippo", "Function nodes only"],
            ["flow:current pippo", "current flow"],
            ["re:id\\s*:\\s*810", "regular expression"],
            ["\"frase esatta\"", "exact phrase"]
        ].forEach(function(item) {
            const line = $("<div>", { class: "nr-advanced-search-help-line" }).appendTo(helpText);
            $("<code>", { text: item[0] }).appendTo(line);
            $("<span>", { text: item[1] }).appendTo(line);
        });

        const status = $("<div>", { class: "nr-advanced-search-status" }).appendTo(content);
        $("<i>", { class: "fa fa-info-circle" }).appendTo(status);
        const summary = $("<span>", { text: "Ready" }).appendTo(status);
        const error = $("<div>", { class: "nr-advanced-search-error" }).hide().appendTo(content);
        const results = $("<div>", { class: "nr-advanced-search-results" }).appendTo(content);

        ui = {
            content: content,
            query: query,
            searchButton: searchButton,
            clearButton: clearButton,
            clearQueryButton: clearQueryButton,
            caseSensitive: caseSensitive.input,
            wholeWord: wholeWord.input,
            regex: regex.input,
            numeric: numeric.input,
            currentFlow: currentFlow.input,
            includeConfig: includeConfig.input,
            nodeType: nodeType,
            blockCoreSearch: blockCoreSearch.input,
            summary: summary,
            error: error,
            results: results
        };

        function updateClearQueryButton() {
            clearQueryButton.prop("disabled", query.val().length == 0);
        }

        searchButton.on("click", performSearch);
        query.on("input", updateClearQueryButton);
        query.on("keydown", function(event) {
            if (event.key == "Enter") {
                event.preventDefault();
                performSearch();
            }
            if (event.key == "Escape") {
                query.val("");
                updateClearQueryButton();
            }
        });
        clearQueryButton.on("click", function() {
            query.val("");
            updateClearQueryButton();
            query.trigger("focus");
        });
        clearButton.on("click", function() {
            query.val("");
            updateClearQueryButton();
            caseSensitive.input.prop("checked", false);
            wholeWord.input.prop("checked", false);
            regex.input.prop("checked", false);
            numeric.input.prop("checked", false);
            currentFlow.input.prop("checked", false);
            includeConfig.input.prop("checked", false);
            refreshNodeTypes(false);
            nodeType.val("");
            error.empty().hide();
            results.empty();
            summary.text("Ready");
            query.trigger("focus");
        });
        includeConfig.input.on("change", function() {
            refreshNodeTypes(includeConfig.input.prop("checked"));
        });
        regex.input.on("change", function() {
            if (regex.input.prop("checked")) {
                numeric.input.prop("checked", false);
            }
        });
        numeric.input.on("change", function() {
            if (numeric.input.prop("checked")) {
                regex.input.prop("checked", false);
            }
        });
        blockCoreSearch.input.on("change", function() {
            blockCoreSearchHover = blockCoreSearch.input.prop("checked");
            saveBlockCoreSearchHover();
        });

        refreshNodeTypes(false);
        updateClearQueryButton();
        return content;
    }

    RED.plugins.registerPlugin(pluginId, {
        type: "editor",
        onadd: function() {
            let content;

            blockCoreSearchHover = loadBlockCoreSearchHover();
            installCoreSearchHoverGuard();

            try {
                content = createSidebar();
            } catch (error) {
                console.error("[Advanced Search] Unable to create the sidebar", error);
                content = $("<div>", { class: "nr-advanced-search-load-error" });
                $("<h3>", { text: "Advanced Search failed to load" }).appendTo(content);
                $("<p>", {
                    text: error && error.message ? error.message : String(error)
                }).appendTo(content);
            }

            if (typeof RED.sidebar.containsTab == "function" && RED.sidebar.containsTab(tabId)) {
                RED.sidebar.removeTab(tabId);
            }

            RED.actions.remove(actionName);
            RED.actions.add(actionName, function() {
                RED.sidebar.show(tabId);
                setTimeout(function() {
                    if (ui && ui.query) {
                        ui.query.trigger("focus");
                    }
                }, 50);
            });

            RED.sidebar.addTab({
                id: tabId,
                label: "Find+",
                name: "Advanced Search",
                iconClass: "fa fa-search",
                content: content,
                action: actionName,
                enableOnEdit: true
            });
        },
        onremove: function() {
            removeCoreSearchHoverGuard();
            if (typeof RED.sidebar.containsTab != "function" || RED.sidebar.containsTab(tabId)) {
                RED.sidebar.removeTab(tabId);
            }
            RED.actions.remove(actionName);
            ui = null;
        }
    });
})();
</script>

<style>
.nr-advanced-search {
    --nr-as-accent: var(--red-ui-primary-color, #3f7f93);
    --nr-as-border: var(--red-ui-primary-border-color, #c8c8c8);
    --nr-as-panel: var(--red-ui-secondary-background, rgba(127, 127, 127, 0.07));
    --nr-as-hover: var(--red-ui-list-item-background-hover, rgba(127, 127, 127, 0.10));
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 0;
    overflow: hidden;
}

.nr-advanced-search *,
.nr-advanced-search *::before,
.nr-advanced-search *::after {
    box-sizing: border-box;
}

.nr-advanced-search-controls {
    border-bottom: 1px solid var(--nr-as-border);
    flex: 0 0 auto;
    padding: 12px;
